<div class="page-container">
  <div class="page-header">
    <h1>Add New Player</h1>
    <a routerLink="/players" class="btn-secondary">← Back</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="player-form">
    <div class="form-section">
      <h3>Basic Info</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Player Name *</label>
          <input type="text" formControlName="name"
                 placeholder="e.g. Cristiano Ronaldo">
          <span class="field-error"
                *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
            Name is required
          </span>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" formControlName="age" min="15" max="45">
        </div>
        <div class="form-group">
          <label>Height (cm)</label>
          <input type="number" formControlName="height" min="150" max="220">
        </div>
        <div class="form-group">
          <label>Weight (kg)</label>
          <input type="number" formControlName="weight" min="50" max="120">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Attributes <span class="hint">(1 – 100)</span></h3>
      <div class="attrs-grid">
        <div class="attr-card" *ngFor="let attr of attrs">
          <div class="attr-header">
            <span class="attr-icon">{{ attr.icon }}</span>
            <span class="attr-label">{{ attr.label }}</span>
            <span class="attr-value">{{ val(attr.key) }}</span>
          </div>
          <input type="range" [formControlName]="attr.key"
                 min="1" max="100" class="slider">
          <div class="attr-bar">
            <div class="attr-fill"
                 [style.width.%]="val(attr.key)"
                 [class.low]="val(attr.key) < 40"
                 [class.mid]="val(attr.key) >= 40 && val(attr.key) < 70"
                 [class.high]="val(attr.key) >= 70">
            </div>
          </div>
          <small class="attr-desc">{{ attr.desc }}</small>
        </div>
      </div>
    </div>

    <div class="alert-error" *ngIf="error">{{ error }}</div>

    <div class="form-actions">
      <button type="submit" class="btn-primary btn-lg"
              [disabled]="loading || form.invalid">
        {{ loading ? 'Saving & Predicting...' : '🤖 Save & Predict Position' }}
      </button>
    </div>
  </form>
</div>
